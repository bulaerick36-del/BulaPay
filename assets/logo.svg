<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Gradientes Fintech -->
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5" /> <!-- Indigo -->
      <stop offset="100%" stop-color="#06b6d4" /> <!-- Cyan -->
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f5d4" /> <!-- Mint -->
      <stop offset="100%" stop-color="#10b981" /> <!-- Emerald -->
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Fondo de contraste Fintech -->
  <rect width="100%" height="100%" rx="128" fill="#0b132b" />

  <!-- Símbolo BulaPay: Una 'B' entrelazada con flecha de flujo/ruta y rayo de pago -->
  <g transform="translate(64, 64)" filter="url(#glow)">
    <!-- Círculo de fondo sutil -->
    <circle cx="192" cy="192" r="160" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="8" />

    <!-- Trazo de la Ruta (Línea de flujo logística) -->
    <path d="M 96 280 C 96 140, 288 120, 288 220 C 288 280, 200 300, 160 270" 
          fill="none" stroke="url(#primaryGrad)" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" />

    <!-- El Rayo/Flecha de Recaudo (BulaPay Accent) -->
    <path d="M 120 120 L 192 192 L 150 200 L 220 280 L 140 290 L 160 270" 
          fill="none" stroke="url(#accentGrad)" stroke-width="28" stroke-linecap="round" stroke-linejoin="round" />

    <!-- Nodo central (Cobrador/Agente en Ruta) -->
    <circle cx="288" cy="220" r="22" fill="#00f5d4" />
    <circle cx="288" cy="220" r="12" fill="#0b132b" />

    <!-- Punto de partida (Supervisor) -->
    <circle cx="96" cy="280" r="26" fill="#4f46e5" />
    <circle cx="96" cy="280" r="14" fill="#00f5d4" />
  </g>
</svg>
